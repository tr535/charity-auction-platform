<nav class="luxe-admin-navbar shadow-sm">

                <button pButton label="ניהול מתנות" icon="pi pi-gift" 
                        routerLink="/admin/add-gift" class="luxe-outline-btn btn-gifts"></button>

                        routerLink="/admin/purchase" class="luxe-outline-btn btn-purchases"></button>
