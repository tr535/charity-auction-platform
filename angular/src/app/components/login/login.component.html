<div class="flex justify-content-center align-items-center min-h-screen luxe-page-bg p-3">
  <p-card styleClass="luxe-card shadow-4" [style]="{ width: '400px' }">
    
    <ng-template pTemplate="header">
      <div class="luxe-card-header">
        <div class="luxe-logo-circle">
          <i class="pi pi-lock"></i>
        </div>
        <h2 class="luxe-form-title">כניסה למערכת</h2>
        <p class="luxe-form-subtitle">LUXE 2026</p>
      </div>
    </ng-template>

    <form #loginForm="ngForm" (ngSubmit)="onLogin()" class="flex flex-column gap-4">
      
      @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()!" styleClass="w-full"></p-message>
      }

      <div class="flex flex-column gap-1">
        <span class="p-float-label">
          <input 
            pInputText 
            id="email" 
            name="Email" 
            type="email" 
            required 
            email
            [(ngModel)]="credentials.Email" 
            #emailModel="ngModel"
            class="w-full luxe-input" />
          <label for="email">כתובת אימייל</label>
        </span>
        @if (emailModel.invalid && emailModel.touched) {
          <small class="p-error">נא להזין אימייל תקין</small>
        }
      </div>

      <div class="flex flex-column gap-1">
        <span class="p-float-label">
          <p-password 
            id="password" 
            name="Password"
            [(ngModel)]="credentials.Password" 
            #passModel="ngModel"
            required
            [toggleMask]="true" 
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full luxe-input">
          </p-password>
          <label for="password">סיסמה</label>
        </span>
        @if (passModel.invalid && passModel.touched) {
          <small class="p-error">סיסמה היא שדה חובה</small>
        }
      </div>

      <p-button 
        label="התחבר למערכת" 
        icon="pi pi-sign-in" 
        type="submit"
        [disabled]="loginForm.invalid"
        styleClass="w-full luxe-login-btn-main shadow-2">
      </p-button>
      
      <div class="text-center mt-2">
        <span class="text-600">עדיין לא רשום? </span>
        <a routerLink="/register" class="luxe-link">צור חשבון חדש</a>
      </div>

    </form>
  </p-card>
</div>
